# Render Blueprint — static-site hosting for the wedding invitation.
#
# Render reads this file when you connect the repo. It runs `npm run
# build` (which copies + minifies into dist/) and serves the dist/
# folder behind Render's global CDN. No server-side code; no database.

services:
  - type: web
    name: wedding-invitation
    runtime: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /admin
        destination: /admin.html
